name: lint
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
permissions:
  contents: read
  pull-requests: write
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/checkout@v4
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.12.2
          only-new-issues: true
          args: -v