version: "2"

linters:
  default: all
  disable:
    - gochecknoglobals
    - funlen
    - exhaustruct
    - depguard
    - varnamelen
    - wsl
    - wsl_v5
    - wrapcheck
    - whitespace
    - thelper
    - testpackage
    - godot
    - mnd
    - gomoddirectives
    - goconst
    - paralleltest
    - noinlineerr
    - cyclop
  settings:
    gosec:
      excludes:
        - G203 # Use of unescaped data in HTML templates - this packages generates HTML from a template
        - G706 # Log injection in examples SMTP password prompt
    modernize:
      disable:
        - stringsseq
    lll:
      line-length: 150
    revive:
      rules:
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - lll
      - path: default\.go
        linters:
          - lll
      - path: examples/maintenance\.go
        linters:
          - lll

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
